<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — HealthSync AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-page">
    <div class="auth-card">
        <a href="/" class="logo">
            <div class="logo-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            </div>
            HealthSync<span>AI</span>
        </a>
        <h2>Create your account</h2>
        <p class="subtitle">Start tracking your health in minutes</p>

        <form id="registerForm">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" class="form-input" placeholder="...." required>
            </div>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="form-input" placeholder="...." required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-input" placeholder="At least 6 characters" required minlength="6">
            </div>
            <div id="registerError" class="form-error" style="display:none"></div>
            <div class="form-actions">
                <a href="/login" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Create Account</button>
            </div>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="/login">Log in</a>
        </div>
    </div>
</div>

<div id="toastContainer"></div>
<script src="script.js"></script>
</body>
</html>
