<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - HealthSync AI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="page-wrapper">

  <header class="topbar">
    <div class="topbar-brand">
      <span class="logo-icon" aria-hidden="true">+</span>
      <h1 class="brand-title">HealthSync <span class="accent">AI</span></h1>
    </div>

    <div class="topbar-right">
      <span id="user-greeting" class="user-greeting">Hello</span>
      <button type="button" id="logout-btn" class="logout-btn">Logout</button>
    </div>
  </header>

  <main class="card">
    <h2 class="card-title">Symptom Check</h2>
    <p class="card-description">
      Share what you are experiencing today.
    </p>

    <label for="symptom-input" class="input-label">Symptoms</label>
    <textarea
      id="symptom-input"
      class="symptom-textarea"
      placeholder="Example: fever, headache, cough for two days"
      rows="6"
    ></textarea>
    <span class="input-hint">Include timing, severity, and any recent changes.</span>

    <button type="button" id="submit-btn" class="submit-btn">
      <span class="btn-text">Analyze Symptoms</span>
      <span class="btn-icon" aria-hidden="true">&gt;</span>
    </button>

    <section id="response-section" class="response-section" hidden aria-live="polite">
      <div class="response-inner">
        <span class="response-icon" aria-hidden="true"></span>
        <div id="response-message" class="response-message"></div>
      </div>
    </section>
  </main>

  <section class="history-card">
    <h2>Recent Checks</h2>
    <p id="history-empty" class="history-empty">No symptom checks yet.</p>
    <div id="history-list"></div>
  </section>

  <footer class="footer">
    HealthSync AI is an educational demo and not a substitute for professional medical advice.
  </footer>

</div>

<script src="script.js"></script>
</body>
</html>
