<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — HealthSync AI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="auth-wrapper">

  <header class="auth-header">
    <span class="logo-icon" aria-hidden="true">✦</span>
    <h1 class="brand-title">HealthSync <span class="accent">AI</span></h1>
    <p class="brand-tagline">Your intelligent health companion</p>
  </header>

  <div class="auth-card">
    <h2 class="auth-card-title">Create your account</h2>
    <p class="auth-card-desc">Start tracking your health with AI assistance.</p>

    <div id="alert" class="auth-alert" role="alert"></div>

    <form class="auth-form" id="register-form" novalidate>

      <div class="name-row">
        <div class="form-group">
          <label for="first-name">First name</label>
          <input type="text" id="first-name" placeholder="Bishesh" required />
        </div>
        <div class="form-group">
          <label for="last-name">Last name</label>
          <input type="text" id="last-name" placeholder="Sharma" required />
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="At least 8 characters"
               autocomplete="new-password" required oninput="updateStrength(this.value)" />
        <div class="strength-bar" aria-hidden="true">
          <div class="strength-fill" id="strength-fill"></div>
        </div>
      </div>

      <div class="form-group">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" placeholder="Repeat your password"
               autocomplete="new-password" required />
      </div>

      <button type="submit" class="auth-btn" id="register-btn">
        <span class="btn-text">Create account</span>
        <span class="btn-icon" aria-hidden="true">→</span>
      </button>

    </form>

    <div class="auth-divider">or</div>
    <p class="auth-switch">Already have an account? <a href="login.html">Sign in</a></p>
  </div>

  <p class="auth-disclaimer">
    By registering you confirm this is a demo/educational project
    and not a certified medical service.
  </p>

</div>

<script>
  // ── Already logged in? Skip to dashboard ──────────────────────────────────
  if (localStorage.getItem("hs_token")) {
    window.location.href = "dashboard.html";
  }

  const form  = document.getElementById("register-form");
  const btn   = document.getElementById("register-btn");
  const alert = document.getElementById("alert");

  function showAlert(type, msg) {
    alert.className = "auth-alert " + type;
    alert.textContent = msg;
    alert.style.display = "block";
  }

  function setLoading(on) {
    btn.disabled = on;
    btn.querySelector(".btn-text").textContent = on ? "Creating account…" : "Create account";
    btn.querySelector(".btn-icon").textContent = on ? "⏳" : "→";
  }

  // ── Live password strength bar ─────────────────────────────────────────────
  function updateStrength(val) {
    const fill   = document.getElementById("strength-fill");
    let score    = 0;
    if (val.length >= 8)          score++;
    if (/[A-Z]/.test(val))        score++;
    if (/[0-9]/.test(val))        score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const widths = ["0%", "30%", "55%", "80%", "100%"];
    const colors = ["transparent", "#E24B4A", "#EF9F27", "#1D9E75", "#0F6E56"];
    fill.style.width      = widths[score];
    fill.style.background = colors[score];
  }

  form.addEventListener("submit", async function (e) {
    e.preventDefault();

    const firstName = document.getElementById("first-name").value.trim();
    const lastName  = document.getElementById("last-name").value.trim();
    const email     = document.getElementById("email").value.trim();
    const password  = document.getElementById("password").value;
    const confirm   = document.getElementById("confirm").value;

    // ── 1. Client-side validation ──────────────────────────────────────────
    if (!firstName || !lastName || !email || !password || !confirm) {
      showAlert("error", "Please fill in all fields."); return;
    }
    if (password.length < 8) {
      showAlert("error", "Password must be at least 8 characters."); return;
    }
    if (password !== confirm) {
      showAlert("error", "Passwords do not match."); return;
    }

    // ── 2. Loading ─────────────────────────────────────────────────────────
    setLoading(true);

    try {
      // ── 3. POST /auth/register ────────────────────────────────────────────
      const res  = await fetch("http://127.0.0.1:8000/auth/register", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({
          first_name: firstName,
          last_name:  lastName,
          email,
          password,
        }),
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.detail || "Registration failed.");
      }

      // ── 4. Save token + redirect ──────────────────────────────────────────
      // Register returns a token too — user is logged in immediately
      localStorage.setItem("hs_token", data.token);
      localStorage.setItem("hs_user",  JSON.stringify(data.user));

      showAlert("success", "Account created! Taking you to your dashboard…");
      setTimeout(() => { window.location.href = "dashboard.html"; }, 1200);

    } catch (err) {
      showAlert("error", err.message);
    } finally {
      setLoading(false);
    }
  });
</script>

</body>
</html>
