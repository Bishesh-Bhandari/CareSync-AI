<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In — HealthSync AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-page">
    <div class="auth-card">
        <a href="/" class="logo">
            <div class="logo-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            </div>
            HealthSync<span>AI</span>
        </a>
        <h2>Welcome back</h2>
        <p class="subtitle">Log in to access your health dashboard</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
            </div>
            <div id="loginError" class="form-error" style="display:none"></div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary" style="width:100%">Log In</button>
            </div>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="/register">Create one</a>
        </div>

        <div style="margin-top:20px; padding:16px; background:var(--bg); border-radius:var(--radius-xs); font-size:12px; color:var(--text-muted);">
            <strong style="color:var(--text-secondary)">Demo Access:</strong><br>
            Email: sarah@healthsync.ai<br>
            Password: patient123
        </div>
    </div>
</div>

<div id="toastContainer"></div>
<script src="script.js"></script>
</body>
</html>
